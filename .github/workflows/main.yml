name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================================
      # OPTION 2 : RESTAURATION DE LA MÉMOIRE (CACHE)
      # ==========================================
      - name: Restaurer les données persistantes
        id: cache-rdp
        uses: actions/cache@v4
        with:
          path: C:\RDP_Data
          key: rdp-data-v1-${{ github.run_id }}
          restore-keys: |
            rdp-data-v1-

      - name: Initialiser le dossier de données si vide
        shell: powershell
        run: |
          if (-not (Test-Path "C:\RDP_Data")) {
              New-Item -ItemType Directory -Path "C:\RDP_Data" -Force
              Set-Content -Path "C:\RDP_Data\LISEZ_MOI.txt" -Value "Mettez tous vos fichiers importants et profils ici pour qu'ils soient sauvegardés !"
          }

      # ==========================================
      # CONFIGURATION DU SYSTÈME & RDP
      # ==========================================
      - name: Configure Core RDP Settings
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389 remoteip=100.64.0.0/10

          Restart-Service -Name TermService -Force

      - name: Create RDP User
        shell: powershell
        run: |
          $securePass = ConvertTo-SecureString "${{ secrets.RDP_PASS }}" -AsPlainText -Force
          if (-not (Get-LocalUser -Name "Neon" -ErrorAction SilentlyContinue)) {
              New-LocalUser -Name "Neon" -Password $securePass -AccountNeverExpires
              Add-LocalGroupMember -Group "Administrators" -Member "Neon"
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member "Neon"
          }

      # ==========================================
      # OPTION 1 : INSTALLATION DES LOGICIELS (WINGET)
      # ==========================================
      - name: Installer les applications de travail
        shell: powershell
        run: |
          Write-Host "Installation de Google Chrome..."
          winget install --id Google.Chrome --silent --accept-source-agreements --accept-package-agreements
          
          Write-Host "Installation de VS Code..."
          winget install --id Microsoft.VisualStudioCode --silent --accept-source-agreements --accept-package-agreements

      # ==========================================
      # RÉSEAU VPN (TAILSCALE)
      # ==========================================
      - name: Install Tailscale
        shell: powershell
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          $process = Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait -PassThru
          if ($process.ExitCode -ne 0) { exit 1 }
          Remove-Item $installerPath -Force

      - name: Establish Tailscale Connection
        shell: powershell
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-${{ github.run_id }}
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 12) {
              Start-Sleep -Seconds 5
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              $retries++
          }
          if (-not $tsIP) { exit 1 }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Verify RDP Accessibility
        shell: powershell
        run: |
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if (-not $testResult.TcpTestSucceeded) { exit 1 }

      # ==========================================
      # MAINTIEN DE LA SESSION & LOGS
      # ==========================================
      - name: Maintain Connection
        shell: powershell
        run: |
          Write-Host "`n===============================================" -ForegroundColor Green
          Write-Host "          CONNEXION RDP PRÊTE                  " -ForegroundColor Green
          Write-Host "===============================================" -ForegroundColor Green
          Write-Host "Adresse IP Tailscale : $env:TAILSCALE_IP" -ForegroundColor Cyan
          Write-Host "Utilisateur          : Neon" -ForegroundColor Cyan
          Write-Host "Dossier Persistant   : C:\RDP_Data" -ForegroundColor Yellow
          Write-Host "-----------------------------------------------"
          Write-Host "IMPORTANT : Sauvegardez vos fichiers et profils"
          Write-Host "dans 'C:\RDP_Data' pour qu'ils persistent !"
          Write-Host "==============================================="`n

          $runtime = 0
          while ($runtime -lt 21000) {
              Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Session RDP active..."
              Start-Sleep -Seconds 300
              $runtime += 300
          }
