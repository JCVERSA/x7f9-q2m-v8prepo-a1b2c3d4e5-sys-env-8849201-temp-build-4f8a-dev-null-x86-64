name: RDP-Robust-Cache

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-2025
    timeout-minutes: 350
    
    steps:
      - name: "Initialisation"
        uses: actions/checkout@v4

      # 1. Restauration du Cache (Firefox et Projets séparés)
      - name: "Restaurer Cache Firefox"
        uses: actions/cache@v4
        with:
          path: D:\RDP_Data\FirefoxProfile
          key: firefox-profile-${{ github.run_id }}
          restore-keys: firefox-profile-

      - name: "Restaurer Cache Projets"
        uses: actions/cache@v4
        with:
          path: D:\RDP_Data\Projects
          key: projects-${{ github.run_id }}
          restore-keys: projects-

      - name: "Setup Windows & Apps"
        shell: powershell
        run: |
          # Config RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          
          # Installation apps (avec boucle de sécurité)
          $apps = @("Microsoft.VisualStudioCode", "Mozilla.Firefox", "Oracle.JDK.21")
          foreach ($app in $apps) {
              winget install --id $app --silent --accept-source-agreements --accept-package-agreements -e
          }

      - name: "Configuration Firefox (Persistant)"
        shell: powershell
        run: |
          $shortcut = "C:\Users\Public\Desktop\Firefox.lnk"
          $target = "C:\Program Files\Mozilla Firefox\firefox.exe"
          $args = "--profile `"D:\RDP_Data\FirefoxProfile`""
          $WScriptShell = New-Object -ComObject WScript.Shell
          $Shortcut = $WScriptShell.CreateShortcut($shortcut)
          $Shortcut.TargetPath = $target
          $Shortcut.Arguments = $args
          $Shortcut.Save()

      - name: "Setup Tailscale"
        shell: powershell
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile "$env:TEMP\ts.msi"
          Start-Process msiexec.exe -ArgumentList "/i `"$env:TEMP\ts.msi`" /quiet" -Wait
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: "Interface de contrôle"
        shell: powershell
        run: |
          # Alertes visuelles
          $totalSeconds = 20400
          for ($i=1; $i -le $totalSeconds; $i+=10) {
              Start-Sleep -Seconds 10
              if ($i -eq 18600) { msg * "Attention: Le RDP se ferme dans 30 minutes !" }
              if ($i -eq 19800) { msg * "Attention: Le RDP se ferme dans 10 minutes ! Fermez Firefox et VS Code." }
          }

      # 2. Nettoyage avant la fin (CRUCIAL pour le cache)
      - name: "Nettoyage avant sauvegarde"
        if: always()
        shell: powershell
        run: |
          Write-Host "Fermeture des processus verrouillants..."
          stop-process -name "firefox" -Force -ErrorAction SilentlyContinue
          stop-process -name "Code" -Force -ErrorAction SilentlyContinue
          stop-process -name "java" -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5
