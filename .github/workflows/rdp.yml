name: RDP-Robust-Final

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-2025
    timeout-minutes: 350

    steps:
      - name: "Initialisation"
        uses: actions/checkout@v4

      - name: "Installation Rclone"
        run: choco install rclone -y

      - name: "Configuration Rclone"
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.config\rclone" | Out-Null
          $config = "${{ secrets.RCLONE_CONFIG }}"
          [System.IO.File]::WriteAllText(
            "$env:USERPROFILE\.config\rclone\rclone.conf",
            $config
          )
          Write-Host "=== Verification config (2 premieres lignes) ==="
          Get-Content "$env:USERPROFILE\.config\rclone\rclone.conf" | Select-Object -First 2

      - name: "Test connexion Rclone"
        shell: pwsh
        run: |
          Write-Host "Test connexion Google Drive..."
          rclone lsd drive: --max-depth 1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Connexion rclone echouee ! Verifiez le secret RCLONE_CONFIG."
            exit 1
          }
          Write-Host "Connexion OK."

      - name: "Restauration (Drive -> VM)"
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "D:\RDP_Data" | Out-Null
          rclone sync drive:RDP_Backup D:\RDP_Data --progress --transfers=4 --retries=3
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Aucune donnee precedente ou erreur sync (ignoree pour premier lancement)."
          }

      - name: "Setup Windows RDP & Apps"
        shell: powershell
        run: |
          # Activer RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0 -Force
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Write-Host "RDP active."

          # Installation apps avec retry
          $apps = @(
            "Google.Chrome",
            "Microsoft.VisualStudioCode",
            "Mozilla.Firefox"
          )
          foreach ($app in $apps) {
            $retry = 0
            $success = $false
            while ($retry -lt 3 -and -not $success) {
              try {
                winget install --id $app --silent `
                  --accept-source-agreements `
                  --accept-package-agreements -e
                $success = $true
                Write-Host "$app installe."
              } catch {
                $retry++
                Write-Host "$app echec tentative $retry, nouvelle tentative..."
                Start-Sleep -Seconds 5
              }
            }
            if (-not $success) {
              Write-Host "$app non installe apres 3 tentatives (continue)."
            }
          }

      - name: "Configuration Firefox (Profil Persistant)"
        shell: powershell
        run: |
          $profileDir = "D:\RDP_Data\FirefoxProfile"
          New-Item -ItemType Directory -Force -Path $profileDir | Out-Null
          
          $ffPath = "C:\Program Files\Mozilla Firefox\firefox.exe"
          if (Test-Path $ffPath) {
            $WScriptShell = New-Object -ComObject WScript.Shell
            $Shortcut = $WScriptShell.CreateShortcut("C:\Users\Public\Desktop\Firefox.lnk")
            $Shortcut.TargetPath = $ffPath
            $Shortcut.Arguments = "--profile `"$profileDir`""
            $Shortcut.Save()
            Write-Host "Raccourci Firefox cree."
          } else {
            Write-Host "Firefox non trouve, raccourci ignore."
          }

      - name: "Setup Tailscale"
        shell: pwsh
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $tsInstaller = "$env:TEMP\tailscale.msi"
          
          Write-Host "Telechargement Tailscale..."
          Invoke-WebRequest -Uri $tsUrl -OutFile $tsInstaller -UseBasicParsing
          
          Write-Host "Installation Tailscale..."
          Start-Process msiexec.exe -ArgumentList "/i `"$tsInstaller`" /quiet /norestart" -Wait
          
          Write-Host "Connexion Tailscale..."
          $tsExe = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (Test-Path $tsExe) {
            & $tsExe up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --accept-routes
            Write-Host "Tailscale connecte."
            & $tsExe status
          } else {
            Write-Error "Tailscale non trouve apres installation."
            exit 1
          }

      - name: "Bouton Sauvegarder et Quitter"
        shell: powershell
        run: |
          $batContent = @'
          @echo off
          echo Sauvegarde en cours, ne fermez pas cette fenetre...
          echo stop > D:\RDP_Data\stop.txt
          echo Fichier stop.txt cree. La sauvegarde va demarrer.
          pause
          '@
          Set-Content "C:\Users\Public\Desktop\Sauvegarder_et_Quitter.bat" $batContent -Encoding ASCII
          Write-Host "Bouton sauvegarde cree sur le bureau."

      - name: "Boucle principale (Maintien + Sauvegarde auto)"
        shell: pwsh
        run: |
          $totalSeconds = 20400  # 5h40 (laisse 10min pour backup final)
          $elapsed = 0
          $interval = 10
          $backupInterval = 1800  # Backup automatique toutes les 30min
          $lastBackup = 0

          Write-Host "Session RDP active. Duree max: $($totalSeconds/60) minutes."
          Write-Host "IP Tailscale:"
          & "$env:ProgramFiles\Tailscale\tailscale.exe" ip

          while ($elapsed -lt $totalSeconds) {
            Start-Sleep -Seconds $interval
            $elapsed += $interval

            # Backup automatique toutes les 30min
            if (($elapsed - $lastBackup) -ge $backupInterval) {
              Write-Host "[$([int]($elapsed/60))min] Backup automatique..."
              rclone sync D:\RDP_Data drive:RDP_Backup --progress --transfers=4
              $lastBackup = $elapsed
              Write-Host "Backup termine."
            }

            # Avertissements
            $remaining = $totalSeconds - $elapsed
            if ($remaining -eq 1800) {
              msg * "Attention: Le RDP se ferme dans 30 minutes ! Cliquez sur Sauvegarder_et_Quitter si vous avez termine." 2>$null
            }
            if ($remaining -eq 600) {
              msg * "URGENT: Le RDP se ferme dans 10 minutes ! Cliquez sur Sauvegarder_et_Quitter maintenant !" 2>$null
            }

            # Detection signal arret manuel
            if (Test-Path "D:\RDP_Data\stop.txt") {
              Write-Host "Signal arret detecte. Sauvegarde finale..."
              rclone sync D:\RDP_Data drive:RDP_Backup --progress --transfers=4
              Remove-Item "D:\RDP_Data\stop.txt" -Force
              Write-Host "Sauvegarde terminee. Au revoir !"
              exit 0
            }
          }

          # Backup final automatique
          Write-Host "Temps ecoule. Sauvegarde finale automatique..."
          rclone sync D:\RDP_Data drive:RDP_Backup --progress --transfers=4
          Write-Host "Session terminee proprement."
