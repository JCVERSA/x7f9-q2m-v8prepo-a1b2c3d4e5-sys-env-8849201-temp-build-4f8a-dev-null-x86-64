name: RDP-Development-Environment

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-2025
    timeout-minutes: 360

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Initialize Environment"
        shell: powershell
        run: |
          .\scripts\Initialize-Environment.ps1 -RdpLanguage "en-US"

      # ==========================================
      # 2. RESTORATION & SAVING OF CACHES
      # ==========================================
      - name: "Cache 1: Personal Projects & Sites"
        uses: actions/cache@v4
        with:
          path: D:\RDP_Data\Projects
          key: rdp-projects-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: rdp-projects-
          save-always: true

      - name: "Cache 2: Persistent Firefox Profile"
        uses: actions/cache@v4
        with:
          path: D:\RDP_Data\FirefoxProfile
          key: rdp-firefox-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: rdp-firefox-
          save-always: true

      - name: "Cache 3: Android Gradle Dependencies"
        uses: actions/cache@v4
        with:
          path: D:\RDP_Data\AndroidConfig\.gradle
          key: rdp-gradle-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: rdp-gradle-
          save-always: true

      - name: "Cache 4: Android Studio Config & SDK"
        uses: actions/cache@v4
        with:
          path: D:\RDP_Data\AndroidConfig
          key: rdp-android-studio-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: rdp-android-studio-
          save-always: true

      - name: "Configure RDP"
        shell: powershell
        run: |
          .\scripts\Setup-RDP.ps1

      - name: "Create RDP User (Neon)"
        shell: powershell
        run: |
          .\scripts\Manage-User.ps1 -Username "Neon" -Password "${{ secrets.RDP_PASS }}"

      # ==========================================
      # 4. INSTALLATION OF DEVELOPMENT TOOLS
      # ==========================================
      - name: "Install development tools (Winget)"
        shell: powershell
        run: |
          winget source update --disable-interactivity
          $packages = @(
              "Mozilla.Firefox",
              "Microsoft.VisualStudioCode",
              "Git.Git",
              "Oracle.JDK.21",
              "Google.AndroidStudio",
              "OpenJS.NodeJS"
          )
          foreach ($pkg in $packages) {
              Write-Host "Installing $pkg..."
              winget install --id $pkg --silent --accept-source-agreements --accept-package-agreements --disable-interactivity -e
              if ($LASTEXITCODE -ne 0) {
                  Write-Host "[WARNING] Failed to install $pkg. Winget exited with code $LASTEXITCODE" -ForegroundColor Yellow
              }
          }

      # ==========================================
      # 5. ENVIRONMENT CONFIGURATION & SHORTCUTS
      # ==========================================
      - name: "Create desktop shortcuts"
        shell: powershell
        run: |
          $publicDesktop = "C:\Users\Public\Desktop"
          $WScriptShell = New-Object -ComObject WScript.Shell

          $ffShortcut = $WScriptShell.CreateShortcut("$publicDesktop\Firefox.lnk")
          $ffShortcut.TargetPath = "C:\Program Files\Mozilla Firefox\firefox.exe"
          $ffShortcut.Arguments = "-profile `"D:\RDP_Data\FirefoxProfile`""
          $ffShortcut.Save()

          $vscodeShortcut = $WScriptShell.CreateShortcut("$publicDesktop\VS Code.lnk")
          $vscodeShortcut.TargetPath = "$env:ProgramFiles\Microsoft VS Code\Code.exe"
          $vscodeShortcut.Save()

          $androidShortcut = $WScriptShell.CreateShortcut("$publicDesktop\Android Studio.lnk")
          $androidShortcut.TargetPath = "C:\Program Files\Android\Android Studio\bin\studio64.exe"
          $androidShortcut.Save()

      - name: "Establish Tailscale Connection"
        shell: powershell
        run: |
          .\scripts\Install-Tailscale.ps1 -AuthKey "${{ secrets.TAILSCALE_AUTH_KEY }}" -Hostname "gh-runner-${{ github.run_id }}"

      # ==========================================
      # 7. CONNECTION MAINTENANCE & SHUTDOWN DETECTION
      # ==========================================
      - name: "Maintain Connection Loop"
        shell: powershell
        run: |
          $publicDesktop = "C:\Users\Public\Desktop"
          $shortcutPath = "$publicDesktop\Save_and_Exit.bat"
          $scriptContent = @"
          @echo off
          echo ===================================================
          echo    SAVING YOUR PROJECTS AND CLOSING WORKSPACE RDP
          echo ===================================================
          echo.
          echo Transmitting stop notification flag to GitHub...
          echo stop > D:\RDP_Data\stop.txt
          echo.
          echo You can now safely close this Remote Desktop window.
          echo GitHub Actions will finalize cache commit operations.
          echo.
          pause
          "@
          Set-Content -Path $shortcutPath -Value $scriptContent -Force

          Write-Host "`n===============================================" -ForegroundColor Green
          Write-Host "          WINDOWS RDP RUNTIME ONLINE           " -ForegroundColor Green
          Write-Host "===============================================" -ForegroundColor Green
          Write-Host "Tailscale IP Address : $env:TAILSCALE_IP" -ForegroundColor Cyan
          Write-Host "Active Username      : Neon" -ForegroundColor Cyan
          Write-Host "Active Password      : [Use your RDP_PASS secret]" -ForegroundColor Cyan
          Write-Host "-----------------------------------------------"
          Write-Host "⚠️  CRITICAL FOR PERSISTENCE MAPS: ⚠️" -ForegroundColor Red
          Write-Host "When your work session is finished, execute the" -ForegroundColor Yellow
          Write-Host "  'Save_and_Exit' script shortcut found directly" -ForegroundColor Yellow
          Write-Host "  on your cloud instance Windows Desktop interface!" -ForegroundColor Yellow
          Write-Host "==============================================="`n

          $maxSeconds = 21000
          $elapsed = 0
          
          if (Test-Path "D:\RDP_Data\stop.txt") { Remove-Item "D:\RDP_Data\stop.txt" -Force }

          while ($elapsed -lt $maxSeconds) {
              if (Test-Path "D:\RDP_Data\stop.txt") {
                  Remove-Item "D:\RDP_Data\stop.txt" -Force
                  Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Shutdown trigger caught! Initializing unmount procedures..." -ForegroundColor Green
                  break
              }
              Start-Sleep -Seconds 10
              $elapsed += 10
              if (($elapsed % 300) -eq 0) {
                  Write-Host "[$(Get-Date -Format 'HH:mm:ss')] RDP session still active..."
              }
          }

      - name: "Cleanup Environment"
        if: always()
        shell: powershell
        run: |
          .\scripts\Cleanup.ps1
