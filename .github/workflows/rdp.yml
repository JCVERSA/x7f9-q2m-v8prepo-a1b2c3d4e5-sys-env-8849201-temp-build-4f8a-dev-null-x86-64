name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-2025
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================================
      # RESTAURATION DE LA MÉMOIRE SUR LE DISQUE D:
      # ==========================================
      - name: Restaurer les données persistantes
        id: cache-rdp
        uses: actions/cache@v4
        with:
          path: D:\RDP_Data
          key: rdp-data-v1-${{ github.run_id }}
          restore-keys: |
            rdp-data-v1-

      - name: Initialiser l'arborescence persistante (Disque D:)
        shell: powershell
        run: |
          $dirs = @(
              "D:\RDP_Data",
              "D:\RDP_Data\Projects",
              "D:\RDP_Data\ChromeProfile",
              "D:\RDP_Data\AndroidConfig\.android",
              "D:\RDP_Data\AndroidConfig\.AndroidStudio",
              "D:\RDP_Data\AndroidConfig\.gradle"
          )
          foreach ($dir in $dirs) {
              if (-not (Test-Path $dir)) {
                  New-Item -ItemType Directory -Path $dir -Force
              }
          }

      # ==========================================
      # CONFIGURATION DU SYSTÈME & RDP
      # ==========================================
      - name: Configure Core RDP Settings
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389 remoteip=100.64.0.0/10

          Restart-Service -Name TermService -Force

      - name: Create RDP User
        shell: powershell
        run: |
          $securePass = ConvertTo-SecureString "${{ secrets.RDP_PASS }}" -AsPlainText -Force
          if (-not (Get-LocalUser -Name "Neon" -ErrorAction SilentlyContinue)) {
              New-LocalUser -Name "Neon" -Password $securePass -AccountNeverExpires
              Add-LocalGroupMember -Group "Administrators" -Member "Neon"
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member "Neon"
          }

      # ==========================================
      # INSTALLATION DES OUTILS DEV
      # ==========================================
      - name: Installer les applications de travail
        shell: powershell
        run: |
          $packages = @(
              "Google.Chrome",
              "Microsoft.VisualStudioCode",
              "Git.Git",
              "Oracle.JDK.21",
              "Google.AndroidStudio"
          )
          foreach ($pkg in $packages) {
              Write-Host "Installation de $pkg..."
              winget install --id $pkg --silent --accept-source-agreements --accept-package-agreements
          }

      # ==========================================
      # FORCER LA PERSISTANCE D'ANDROID STUDIO SUR D:
      # ==========================================
      - name: Rediriger les données Android Studio vers le disque D:
        shell: powershell
        run: |
          [Environment]::SetEnvironmentVariable("GRADLE_USER_HOME", "D:\RDP_Data\AndroidConfig\.gradle", "Machine")
          [Environment]::SetEnvironmentVariable("ANDROID_USER_HOME", "D:\RDP_Data\AndroidConfig\.android", "Machine")
          [Environment]::SetEnvironmentVariable("ANDROID_EMULATOR_HOME", "D:\RDP_Data\AndroidConfig\.android", "Machine")
          
          echo "GRADLE_USER_HOME=D:\RDP_Data\AndroidConfig\.gradle" >> $env:GITHUB_ENV
          echo "ANDROID_USER_HOME=D:\RDP_Data\AndroidConfig\.android" >> $env:GITHUB_ENV

      # ==========================================
      # RÉSEAU VPN (TAILSCALE)
      # ==========================================
      - name: Install Tailscale
        shell: powershell
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          $process = Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait -PassThru
          if ($process.ExitCode -ne 0) { exit 1 }
          Remove-Item $installerPath -Force

      - name: Establish Tailscale Connection
        shell: powershell
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-${{ github.run_id }}
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 12) {
              Start-Sleep -Seconds 5
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              $retries++
          }
          if (-not $tsIP) { exit 1 }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      # ==========================================
      # MAINTIEN DE LA SESSION AVEC DETECTION D'ARRÊT
      # ==========================================
      - name: Maintain Connection
        shell: powershell
        run: |
          # Créer le script de sauvegarde sur le bureau public Windows
          $publicDesktop = "C:\Users\Public\Desktop"
          if (-not (Test-Path $publicDesktop)) { New-Item -ItemType Directory -Path $publicDesktop -Force }
          
          $shortcutPath = "$publicDesktop\Sauvegarder_et_Quitter.bat"
          $scriptContent = @"
          @echo off
          echo ===================================================
          echo   SAUVEGARDE DE VOS PROJETS ET FERMETURE DU RDP
          echo ===================================================
          echo.
          echo Envoi du signal d'arret a GitHub...
          echo stop > D:\RDP_Data\stop.txt
          echo.
          echo Vous pouvez desormais fermer cette fenetre RDP.
          echo GitHub va valider la session et sauvegarder D:\RDP_Data.
          echo.
          pause
          "@
          Set-Content -Path $shortcutPath -Value $scriptContent -Force

          Write-Host "`n===============================================" -ForegroundColor Green
          Write-Host "          CONNEXION RDP PRÊTE                  " -ForegroundColor Green
          Write-Host "===============================================" -ForegroundColor Green
          Write-Host "Adresse IP Tailscale : $env:TAILSCALE_IP" -ForegroundColor Cyan
          Write-Host "Utilisateur          : Neon" -ForegroundColor Cyan
          Write-Host "Dossier Persistant   : D:\RDP_Data" -ForegroundColor Yellow
          Write-Host "-----------------------------------------------"
          Write-Host "⚠️ IMPORTANT POUR NE RIEN PERDRE : ⚠️" -ForegroundColor Red
          Write-Host "Quand vous avez fini, double-cliquez sur l'icone" -ForegroundColor Yellow
          Write-Host "'Sauvegarder_et_Quitter' directement sur le" -ForegroundColor Yellow
          Write-Host "bureau de votre machine Windows virtuelle !" -ForegroundColor Yellow
          Write-Host "==============================================="`n

          $maxSeconds = 20400 # 340 minutes (Arrêt propre automatique avant le timeout GitHub de 350m)
          $elapsed = 0
          
          if (Test-Path "D:\RDP_Data\stop.txt") { Remove-Item "D:\RDP_Data\stop.txt" -Force }

          while ($elapsed -lt $maxSeconds) {
              if (Test-Path "D:\RDP_Data\stop.txt") {
                  Remove-Item "D:\RDP_Data\stop.txt" -Force
                  Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Signal d'arret recu ! Fermeture propre pour sauvegarde..." -ForegroundColor Green
                  break
              }
              Start-Sleep -Seconds 10
              $elapsed += 10
              if (($elapsed % 300) -eq 0) {
                  Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Session RDP toujours active..."
              }
          }
