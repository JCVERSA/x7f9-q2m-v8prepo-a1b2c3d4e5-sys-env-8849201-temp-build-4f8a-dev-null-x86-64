name: Chill

on:
  workflow_dispatch:
    inputs:
      rdp_username:
        description: "Username for the RDP/SSH session"
        required: true
        default: "Neon"
        type: string
      rdp_password:
        description: "Password for RDP/SSH (Must meet Windows Server complexity requirements)"
        required: true
        type: string
      rdp_language:
        description: "System and Display Language for the Workspace"
        required: true
        default: "en-US"
        type: choice
        options:
          - "en-US" # English (United States)
          - "fr-FR" # French (France)
          - "es-ES" # Spanish (Spain)
      rdp_timeout:
        description: "Session timeout allocation in minutes (Max: 350 min / 5h50)"
        required: true
        default: "350"
        type: string
      node_version:
        description: "Node.js Environment Architecture Upgrade"
        required: true
        default: "22"
        type: choice
        options:
          - "22" # Current Stable Long-Term Support
          - "24" # Node 24 Infrastructure Standard
          - "20" # Legacy Compatibility Layer
      java_version:
        description: "Java JDK Environment Architecture Upgrade (Android Development)"
        required: true
        default: "17"
        type: choice
        options:
          - "17" # Standard LTS for modern Android Studio
          - "21" # Next-Gen Enterprise OpenJDK
          - "11" # Legacy Android Compatibility
      ssh_shell:
        description: "Default shell for the SSH session"
        required: true
        default: "powershell"
        type: choice
        options:
          - "powershell"
          - "cmd"

      # ==========================================
      # LOCKS & DEPENDENCY ENGINES (BOOLEANS)
      # ==========================================
      install_ssh_sftp:
        description: "Install and Configure OpenSSH & SFTP Server"
        required: false
        default: false
        type: boolean
      install_claude_code:
        description: "Install Custom Claude Code CLI Utility"
        required: false
        default: false
        type: boolean
      install_ghgrab:
        description: "Install ghgrab via pipx toolset"
        required: false
        default: false
        type: boolean
      install_ollama:
        description: "Install Ollama Local AI Infrastructure"
        required: false
        default: false
        type: boolean
      install_php:
        description: "Install PHP Runtime Environment"
        required: false
        default: false
        type: boolean
      install_docker:
        description: "Install Docker Desktop Infrastructure Engine"
        required: false
        default: false
        type: boolean

      # ==========================================
      # BULK LOADING ZONE (50+ APPS)
      # ==========================================
      custom_winget_apps:
        description: "List of Apps to deploy via Winget (Leave empty to install nothing)"
        required: false
        type: string
        default: ""

# ========================================================
# 🔒 INFRASTRUCTURE SECURITY: STRICT PERMISSIONS RETAINED
# ========================================================
permissions:
  contents: read   # The server can read the code but cannot modify anything on your GitHub
  actions: read    # Read-only access to statuses

jobs:
  secure-rdp:
    # 🔒 REPOSITORY LOCK: The workflow will strictly refuse to run on a third-party fork
    if: github.repository == 'JCVERSA/KWEPING-space'
    runs-on: windows-2025
    
    # 🔒 APPROVAL LOCK: Requires mandatory manual approval and links access to the environment secret
    environment: Production
    
    # Strict dynamic allocation limit
    timeout-minutes: 360

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Mask sensitive inputs"
        shell: powershell
        run: |
          echo "::add-mask::${{ inputs.rdp_password }}"

      - name: "Initialize Environment"
        shell: powershell
        run: |
          .\scripts\Initialize-Environment.ps1 -RdpLanguage "${{ inputs.rdp_language }}"

      # ==========================================
      # 2. RESTORATION AND SAVING OF CACHES
      # ==========================================
      - name: "Cache 1: Personal Projects & Sites"
        uses: actions/cache@v4
        with:
          path: D:\RDP_Data\Projects
          key: rdp-projects-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: rdp-projects-

      - name: "Cache 2: Persistent Firefox Profile"
        uses: actions/cache@v4
        with:
          path: D:\RDP_Data\FirefoxProfile
          key: rdp-firefox-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: rdp-firefox-

      - name: "Cache 3: Android Gradle Dependencies"
        uses: actions/cache@v4
        with:
          path: D:\RDP_Data\AndroidConfig\.gradle
          key: rdp-gradle-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: rdp-gradle-

      - name: "Cache 4: Android Studio Config & SDK"
        uses: actions/cache@v4
        with:
          path: D:\RDP_Data\AndroidConfig
          key: rdp-android-studio-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: rdp-android-studio-

      # ==========================================
      # 3. RUNTIME DEPLOYMENT (NODE & JAVA)
      # ==========================================
      - name: "Deploy Selected Runtime: Node.js v${{ inputs.node_version }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: "Deploy Selected Runtime: Java OpenJDK v${{ inputs.java_version }}"
        uses: actions/setup-java@v4
        with:
          distribution: "microsoft"
          java-version: ${{ inputs.java_version }}

      # ==========================================
      # 3.4 SSH / SFTP SERVER DEPLOYMENT
      # ==========================================
      - name: "Provision OpenSSH & SFTP Server Engine"
        shell: powershell
        run: |
          if ("${{ inputs.install_ssh_sftp }}" -eq "true") {
              Write-Host "[SSH] Installing native OpenSSH Server feature..." -ForegroundColor Cyan
              Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0
              
              Write-Host "[SSH] Configuring and starting sshd services..." -ForegroundColor Cyan
              Start-Service sshd
              Set-Service -Name sshd -StartupType 'Automatic'
              
              # Port 22 open only for Tailscale IP range (Zero Trust Security)
              Write-Host "[SSH] Securing firewall rules for Tailscale ecosystem..." -ForegroundColor Cyan
              netsh advfirewall firewall delete rule name="OpenSSH-Server-In-TCP" 2>$null
              netsh advfirewall firewall add rule name="SSH-SFTP-Tailscale" dir=in action=allow protocol=TCP localport=22 remoteip=100.64.0.0/10

              # Configuring default shell
              $shellChoice = "${{ inputs.ssh_shell }}"
              Write-Host "[SSH] Configuring default shell to: $shellChoice" -ForegroundColor Cyan

              $shellExe = if ($shellChoice -eq "powershell") { "powershell.exe" } else { "cmd.exe" }
              $shellPath = (Get-Command $shellExe).Source

              if (-not (Test-Path "HKLM:\SOFTWARE\OpenSSH")) {
                  New-Item -Path "HKLM:\SOFTWARE\OpenSSH" -Force | Out-Null
              }
              New-ItemProperty -Path "HKLM:\SOFTWARE\OpenSSH" -Name "DefaultShell" -Value $shellPath -PropertyType String -Force
              Restart-Service sshd -Force
              
              Write-Host "[SUCCESS] OpenSSH and SFTP endpoint is ready on port 22." -ForegroundColor Green
          } else {
              Write-Host "[SSH] OpenSSH installation bypassed." -ForegroundColor Yellow
          }

      # ==========================================
      # 3.5 CUSTOM ARCHITECT TOOLS DEPLOYMENT
      # ==========================================
      - name: "Provision Custom Architect Tools"
        shell: powershell
        run: |
          # 1. Custom Claude Code Installation
          if ("${{ inputs.install_claude_code }}" -eq "true") {
              Write-Host "[INSTALL] Deploying Free Claude Code..." -ForegroundColor Cyan
              irm "https://github.com/Alishahryar1/free-claude-code/blob/main/scripts/install.ps1?raw=1" | iex
          }

          # 2. ghgrab installation via pipx
          if ("${{ inputs.install_ghgrab }}" -eq "true") {
              Write-Host "[INSTALL] Deploying ghgrab via pipx..." -ForegroundColor Cyan
              pipx install ghgrab
          }

          # 3. Ollama Installation
          if ("${{ inputs.install_ollama }}" -eq "true") {
              Write-Host "[INSTALL] Deploying Ollama Local Engine..." -ForegroundColor Cyan
              irm https://ollama.com/install.ps1 | iex
          }

          # 4. PHP Environment Deployment
          if ("${{ inputs.install_php }}" -eq "true") {
              Write-Host "[INSTALL] Deploying PHP Environment..." -ForegroundColor Cyan
              winget install --silent --accept-source-agreements --accept-package-agreements PHP.PHP
          }

          # 5. Docker Desktop Installation
          if ("${{ inputs.install_docker }}" -eq "true") {
              Write-Host "[INSTALL] Deploying Docker Desktop Infrastructure..." -ForegroundColor Cyan
              winget install --silent --accept-source-agreements --accept-package-agreements Docker.DockerDesktop
          }

      # ==========================================
      # 3.6 BULK DEPLOYMENT (WINGET)
      # ==========================================
      - name: "Bulk Applications Delivery"
        shell: powershell
        run: |
          $appsString = "${{ inputs.custom_winget_apps }}".Trim()
          if (-not [string]::IsNullOrEmpty($appsString)) {
              $apps = $appsString -split " "
              Write-Host "[WINGET] Bulk execution triggered for $($apps.Count) applications." -ForegroundColor Cyan
              foreach ($app in $apps) {
                  if (-not [string]::IsNullOrEmpty($app)) {
                      Write-Host "Installing Package: $app" -ForegroundColor Cyan
                      winget install --silent --accept-source-agreements --accept-package-agreements --id $app
                      if ($LASTEXITCODE -ne 0) {
                          Write-Host "[WARNING] Failed to install $app. Winget exited with code $LASTEXITCODE" -ForegroundColor Yellow
                      }
                  }
              }
          } else {
              Write-Host "[WINGET] No custom apps provided. Skipping execution step." -ForegroundColor Yellow
          }

      - name: "Configure RDP"
        shell: powershell
        run: |
          .\scripts\Setup-RDP.ps1

      - name: "Create RDP User"
        shell: powershell
        run: |
          .\scripts\Manage-User.ps1 -Username "${{ inputs.rdp_username }}" -Password "${{ inputs.rdp_password }}"

      - name: "Establish Tailscale Connection"
        shell: powershell
        run: |
          .\scripts\Install-Tailscale.ps1 -AuthKey "${{ secrets.TAILSCALE_AUTH_KEY }}" -Hostname "gh-runner-${{ github.run_id }}"

      # ==========================================
      # 8. CONNECTION MAINTENANCE AND EXIT SCRIPT
      # ==========================================
      - name: "Maintain Connection Loop"
        shell: powershell
        run: |
          $publicDesktop = "C:\Users\Public\Desktop"
          $shortcutPath = "$publicDesktop\Save_and_Exit.bat"
          $scriptContent = @"
          @echo off
          echo ===================================================
          echo    SAVING YOUR PROJECTS AND CLOSING WORKSPACE RDP
          echo ===================================================
          echo.
          echo Transmitting stop notification flag to GitHub...
          echo stop > D:\RDP_Data\stop.txt
          echo.
          echo You can now safely close this Remote Desktop window.
          echo GitHub Actions will finalize cache commit operations.
          echo.
          pause
          "@
          Set-Content -Path $shortcutPath -Value $scriptContent -Force

          # Dynamic timeout calculation
          [int]$inputMinutes = ${{ inputs.rdp_timeout }}
          if ($inputMinutes -gt 350 -or $inputMinutes -le 0) { $inputMinutes = 350 }
          $maxSeconds = $inputMinutes * 60
          $elapsed = 0

          Write-Host "`n===============================================" -ForegroundColor Green
          Write-Host "          WINDOWS RDP RUNTIME ONLINE           " -ForegroundColor Green
          Write-Host "===============================================" -ForegroundColor Green
          Write-Host "Tailscale IP Address : $env:TAILSCALE_IP" -ForegroundColor Cyan
          Write-Host "Active Username      : ${{ inputs.rdp_username }}" -ForegroundColor Cyan
          Write-Host "Active Password      : [REDACTED]" -ForegroundColor Cyan
          Write-Host "Selected UI Language : ${{ inputs.rdp_language }}" -ForegroundColor Cyan
          Write-Host "Allocated Runtime    : $inputMinutes minutes (${{ inputs.rdp_timeout }} requested)" -ForegroundColor Cyan
          Write-Host "Node.js Environment  : v${{ inputs.node_version }}" -ForegroundColor Cyan
          Write-Host "Java Development Kit : v${{ inputs.java_version }}" -ForegroundColor Cyan
          
          if ("${{ inputs.install_ssh_sftp }}" -eq "true") {
              Write-Host "SSH/SFTP Server      : $((Get-Service sshd).Status) (Shell: ${{ inputs.ssh_shell }})" -ForegroundColor Green
          } else {
              Write-Host "SSH/SFTP Server      : DISABLED" -ForegroundColor Yellow
          }
          
          Write-Host "-----------------------------------------------"
          Write-Host "⚠️  CRITICAL FOR PERSISTENCE MAPS: ⚠️" -ForegroundColor Red
          Write-Host "When your work session is finished, execute the" -ForegroundColor Yellow
          Write-Host "  'Save_and_Exit' script shortcut found directly" -ForegroundColor Yellow
          Write-Host "  on your cloud instance Windows Desktop interface!" -ForegroundColor Yellow
          Write-Host "==============================================="`n
          
          if (Test-Path "D:\RDP_Data\stop.txt") { Remove-Item "D:\RDP_Data\stop.txt" -Force }

          while ($elapsed -lt $maxSeconds) {
              if (Test-Path "D:\RDP_Data\stop.txt") {
                  Remove-Item "D:\RDP_Data\stop.txt" -Force
                  Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Shutdown trigger caught! Initializing unmount procedures..." -ForegroundColor Green
                  break
              }
              Start-Sleep -Seconds 10
              $elapsed += 10
              if (($elapsed % 300) -eq 0) {
                  $timeLeft = [Math]::Round(($maxSeconds - $elapsed) / 60, 1)
                  Write-Host "[$(Get-Date -Format 'HH:mm:ss')] RDP/SSH pipeline active. Approximately $timeLeft minutes remaining."
              }
          }

      # ==========================================
      # 9. STREAM CLEANUP AND MACHINE SHUTDOWN
      # ==========================================
      - name: "Cleanup Environment"
        if: always()
        shell: powershell
        run: |
          .\scripts\Cleanup.ps1
